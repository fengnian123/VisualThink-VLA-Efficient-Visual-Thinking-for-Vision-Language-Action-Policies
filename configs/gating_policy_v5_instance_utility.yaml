channel_order: [bbox, edge, motion, relation]
budget_values: [1, 2, 3, 4]

channels:
  bbox:
    cost: 1.0
  edge:
    cost: 0.2
  motion:
    cost: 0.25
  relation:
    cost: 0.08

stage_keep_priors:
  approach:
    bbox: 0.70
    edge: 0.75
    motion: 0.15
    relation: 0.60
  grasp:
    bbox: 0.35
    edge: 0.70
    motion: 0.55
    relation: 0.80
  place:
    bbox: 0.55
    edge: 0.70
    motion: 0.15
    relation: 0.55

stage_budget_priors:
  approach: [0.08, 0.42, 0.35, 0.15]
  grasp: [0.05, 0.25, 0.45, 0.25]
  place: [0.08, 0.42, 0.35, 0.15]

loss_weights:
  action: 1.0
  distill: 0.7
  cost: 0.01
  prior: 0.04
  budget: 0.08
  coverage: 0.06
  utility: 0.30
  utility_budget: 0.15
  entropy: 0.01

gating:
  temperature_start: 2.0
  temperature_end: 0.5
  threshold: 0.5
  fallback_entropy_thresh: 0.85
  fallback_min_missing_channels: 3
  fallback_disturbed_only: true

coverage:
  approach:
    bbox: 0.25
    edge: 0.45
    motion: 0.08
    relation: 0.30
  grasp:
    bbox: 0.08
    edge: 0.25
    motion: 0.22
    relation: 0.32
  place:
    bbox: 0.20
    edge: 0.38
    motion: 0.08
    relation: 0.25

utility:
  batch_size: 64
  relative_keep_thresh: 0.33
  absolute_score_thresh: 0.0005

model:
  image_size: 64
  bow_dim: 256
  query_bow_dim: 64
  ctx_dim: 128
  channel_dim: 64
  teacher_hidden: 512
  student_hidden: 256

training:
  teacher_epochs: 4
  gate_warmup_epochs: 2
  joint_epochs: 6
  batch_size: 32
  val_ratio: 0.1
  stage_dropout_prob: 0.35
  lr_teacher: 2.0e-4
  lr_student: 2.0e-4
  lr_gate: 1.0e-4
  weight_decay: 1.0e-4
