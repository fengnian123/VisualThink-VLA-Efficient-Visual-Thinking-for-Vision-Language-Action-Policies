channel_order: [bbox, edge, motion, relation]
budget_values: [1, 2, 3, 4]

channels:
  bbox:
    cost: 0.35
  edge:
    cost: 0.22
  motion:
    cost: 0.18
  relation:
    cost: 0.16

stage_keep_priors:
  approach:
    bbox: 0.78
    edge: 0.62
    motion: 0.28
    relation: 0.45
  grasp:
    bbox: 0.48
    edge: 0.52
    motion: 0.72
    relation: 0.58
  place:
    bbox: 0.62
    edge: 0.58
    motion: 0.26
    relation: 0.40

stage_budget_priors:
  approach: [0.10, 0.40, 0.35, 0.15]
  grasp: [0.08, 0.25, 0.42, 0.25]
  place: [0.10, 0.40, 0.35, 0.15]

loss_weights:
  action: 1.0
  distill: 0.7
  cost: 0.003
  prior: 0.01
  budget: 0.03
  coverage: 0.035
  utility: 1.00
  utility_budget: 0.40
  entropy: 0.015

gating:
  temperature_start: 2.0
  temperature_end: 0.5
  threshold: 0.5
  fallback_entropy_thresh: 0.85
  fallback_min_missing_channels: 3
  fallback_disturbed_only: true

coverage:
  approach:
    bbox: 0.22
    edge: 0.16
    motion: 0.10
    relation: 0.06
  grasp:
    bbox: 0.12
    edge: 0.10
    motion: 0.22
    relation: 0.10
  place:
    bbox: 0.16
    edge: 0.14
    motion: 0.10
    relation: 0.06

utility:
  batch_size: 64
  relative_keep_thresh: 0.25
  absolute_score_thresh: 0.0001
  hard_relation_thresh_raw: 1.0e-5
  hard_relation_weight: 5.0

model:
  image_size: 64
  bow_dim: 256
  query_bow_dim: 64
  ctx_dim: 128
  channel_dim: 64
  teacher_hidden: 512
  student_hidden: 256
  text_encoder:
    type: sequence
    tokenizer_path: openvla/openvla-7b
    instruction_max_len: 24
    query_max_len: 12
    embed_dim: 96
    hidden_dim: 128

training:
  teacher_epochs: 4
  gate_warmup_epochs: 1
  joint_epochs: 6
  batch_size: 32
  val_ratio: 0.1
  stage_dropout_prob: 0.35
  cost_budget_anneal_fraction: 0.60
  lr_teacher: 2.0e-4
  lr_student: 2.0e-4
  lr_gate: 1.0e-4
  weight_decay: 1.0e-4

teacher_dropout:
  prob: 0.7
  min_drop: 1
  max_drop: 2
  channel_weights:
    bbox: 1.0
    edge: 3.0
    motion: 1.0
    relation: 3.0

student_dropout:
  prob: 0.08
  min_keep: 1

student_exploration:
  epsilon: 0.05
  min_keep: 1
  max_keep: 3

usage_band:
  weight: 0.004
  low: 0.05
  high: 0.95
  anneal_fraction: 0.25
