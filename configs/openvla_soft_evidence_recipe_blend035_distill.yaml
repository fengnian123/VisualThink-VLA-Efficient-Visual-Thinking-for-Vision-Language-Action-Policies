channel_order: [bbox, edge, motion, relation]

adapter:
  num_global_tokens: 2
  proj_dim: 768
  dropout: 0.1

training:
  epochs: 4
  batch_size: 1
  grad_accum_steps: 8
  val_ratio: 0.1
  lr: 6.0e-5
  weight_decay: 1.0e-4
  gate_batch_size: 64
  max_train_steps: 1200

dynamic_mask:
  mode: blend
  soft_mask_blend: 0.35
  min_mask_floor: 0.0

distillation:
  weight: 0.2
  temperature: 1.5
